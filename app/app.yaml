command:
  - uvicorn
  - main:app
  - --host
  - 0.0.0.0
  - --port
  - "8000"

# Environment variables are populated by the setup job (task 03_configure_app).
# Run `databricks bundle run setup_insurance_demo` after first deploy to configure.
env:
  - name: DBSQL_WAREHOUSE_ID
    value: "PLACEHOLDER_RUN_SETUP_JOB"
  - name: LAKEBASE_HOST
    value: "PLACEHOLDER_RUN_SETUP_JOB"
  - name: LAKEBASE_DB
    value: "PLACEHOLDER_RUN_SETUP_JOB"
  - name: LAKEBASE_ENDPOINT
    value: "PLACEHOLDER_RUN_SETUP_JOB"
  - name: UC_CATALOG
    value: "PLACEHOLDER_RUN_SETUP_JOB"
  - name: UC_SCHEMA
    value: "PLACEHOLDER_RUN_SETUP_JOB"
